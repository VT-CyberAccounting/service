apiVersion: batch/v1
kind: Job
metadata:
  name: s3-bucket-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: bucket-init
        image: minio/mc:latest
        command: ["/bin/sh", "/scripts/init.sh"]
        env:
          - name: MINIO_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: password
                key: minio
        volumeMounts:
          - name: scripts
            mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: s3-init
            defaultMode: 0755