apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: s3
  labels:
    app: s3
  annotations:
    nginx.ingress.kubernetes.io/whitelist-source-range: 0.0.0.0/0,::/0
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  ingressClassName: "nginx"
  rules:
    - host: {{ (urlParse .Values.s3.publicUrl).host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: s3
                port:
                  number: 80