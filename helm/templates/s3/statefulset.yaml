apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: s3
spec:
  serviceName: s3
  replicas: 1
  selector:
    matchLabels:
      app: s3
  template:
    metadata:
      labels:
        app: s3
    spec:
      containers:
      - name: s3
        image: minio/minio:latest
        args:
          - server
          - /data
        ports:
        - containerPort: 9000
          name: tcp
        env:
          - name: MINIO_ROOT_USER
            value: minio
          - name: MINIO_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: password
                key: minio
        volumeMounts:
        - name: vol
          mountPath: /data

  volumeClaimTemplates:
  - metadata:
      name: vol
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 2Gi